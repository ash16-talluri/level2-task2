<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Design</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      line-height: 1.6;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #333;
      padding: 10px 20px;
      color: white;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
    }

    .nav-links {
      display: flex;
      list-style: none;
    }

    .nav-links li {
      margin-left: 20px;
    }

    .nav-links a {
      text-decoration: none;
      color: white;
      transition: 0.3s;
    }

    .nav-links a:hover {
      color: #00bcd4;
    }

    /* HAMBURGER */
    .menu-toggle {
      display: none;
    }

    .hamburger {
      display: none;
      font-size: 24px;
      cursor: pointer;
    }

    /* CONTENT */
    .container {
      padding: 20px;
      text-align: center;
    }

    /* MEDIA QUERY */
    @media (max-width: 768px) {
      .nav-links {
        position: absolute;
        top: 60px;
        left: 0;
        width: 100%;
        background: #333;
        flex-direction: column;
        align-items: center;
        display: none;
      }

      .nav-links li {
        margin: 15px 0;
      }

      .menu-toggle:checked + .hamburger + .nav-links {
        display: flex;
      }

      .hamburger {
        display: block;
      }
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="logo">My Website</div>

    <!-- Checkbox hack -->
    <input type="checkbox" id="menu-toggle" class="menu-toggle">
    
    <label for="menu-toggle" class="hamburger">&#9776;</label>

    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Services</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <div class="container">
    <h1>Responsive Webpage</h1>
    <p>This layout adjusts automatically for mobile, tablet, and desktop screens.</p>
  </div>

</body>
</html>
