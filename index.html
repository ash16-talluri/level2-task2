<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Page</title>

<style>

/* Default (Desktop) */
body {
  font-family: Arial;
  margin: 0;
}

.header {
  background: #333;
  color: white;
  text-align: center;
  padding: 20px;
}

.container {
  display: flex;
}

.box {
  flex: 1;
  padding: 50px;
  margin: 10px;
  background: lightblue;
  text-align: center;
}

/* Tablet */
@media (max-width: 768px) {
  .container {
    flex-direction: column;
  }

  .box {
    background: lightgreen;
  }
}

/* Mobile */
@media (max-width: 480px) {
  .header {
    font-size: 18px;
  }

  .box {
    padding: 30px;
    background: lightcoral;
  }
}

</style>
</head>

<body>

<div class="header">
  <h1>Responsive Webpage</h1>
</div>

<div class="container">
  <div class="box">Box 1</div>
  <div class="box">Box 2</div>
  <div class="box">Box 3</div>
</div>

</body>
</html>
