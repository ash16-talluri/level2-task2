<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Design</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #333;
  color: white;
  padding: 15px 20px;
  position: relative;
}

.logo {
  font-size: 22px;
  font-weight: bold;
}

/* NAV LINKS */
.nav-links {
  list-style: none;
  display: flex;
}

.nav-links li {
  margin-left: 25px;
}

.nav-links a {
  text-decoration: none;
  color: white;
}

/* HAMBURGER */
.menu-toggle {
  display: none;
}

.hamburger {
  display: none;
  font-size: 28px;
  cursor: pointer;
}

/* HERO */
.header {
  text-align: center;
  padding: 40px;
  background: #666;
  color: white;
}

/* BOX CONTAINER */
.container {
  display: flex;
  gap: 20px;
  padding: 20px;
}

/* BOXES */
.box {
  flex: 1;
  background: #8fb3c1;
  padding: 60px;
  text-align: center;
  border-radius: 10px;
}

/* ========================= */
/* 📱 RESPONSIVE DESIGN */
/* ========================= */

@media (max-width: 768px) {

  /* NAV MENU */
  .nav-links {
    position: absolute;
    top: 60px;
    left: 0;
    width: 100%;
    background: #333;
    flex-direction: column;
    text-align: center;
    display: none;
  }

  .nav-links li {
    margin: 15px 0;
  }

  /* SHOW MENU WHEN CHECKED */
  .menu-toggle:checked + .hamburger + .nav-links {
    display: flex;
  }

  /* SHOW HAMBURGER */
  .hamburger {
    display: block;
  }

  /* STACK BOXES */
  .container {
    flex-direction: column;
  }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo">MySite</div>

  <input type="checkbox" id="menu-toggle" class="menu-toggle">
  <label for="menu-toggle" class="hamburger">&#9776;</label>

  <ul class="nav-links">
    <li><a href="#">Home</a></li>
    <li><a href="#">About</a></li>
    <li><a href="#">Services</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
</nav>

<!-- HEADER -->
<div class="header">
  <h1>Responsive Webpage</h1>
</div>

<!-- CONTENT -->
<div class="container">
  <div class="box">Box 1</div>
  <div class="box">Box 2</div>
  <div class="box">Box 3</div>
</div>

</body>
</html>
